<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian Lopez Garcia | Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        :root {
            --bg: #0b0f17;
            --card: #121826;
            --accent: #00f0ff;
            --text: #e6f1ff;
            --subtext: #8aa2c8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* NAV */
        nav {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 15px 40px;
            background: rgba(11,15,23,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1c2333;
            z-index: 1000;
        }

            nav h3 {
                font-family: 'Orbitron', sans-serif;
                color: var(--accent);
                letter-spacing: 2px;
            }

            nav a {
                color: var(--subtext);
                text-decoration: none;
                margin-left: 25px;
                font-size: 14px;
                transition: 0.3s;
            }

                nav a:hover {
                    color: var(--accent);
                }

        /* HERO */
        header {
            padding: 140px 20px 80px;
            text-align: center;
        }

            header h1 {
                font-family: 'Orbitron', sans-serif;
                font-size: 38px;
                letter-spacing: 2px;
            }

            header p {
                margin-top: 15px;
                color: var(--subtext);
            }

        /* SECTION */
        section {
            padding: 80px 20px;
            max-width: 1100px;
            margin: auto;
        }

            section h2 {
                font-family: 'Orbitron', sans-serif;
                margin-bottom: 40px;
                color: var(--accent);
                text-align: center;
            }

        /* CV */
        .cv-container iframe {
            width: 100%;
            height: 600px;
            border-radius: 15px;
            border: 1px solid #1c2333;
            box-shadow: 0 0 25px rgba(0,240,255,0.1);
        }

        /* BUTTON */
        button {
            padding: 12px 28px;
            margin: 10px;
            border-radius: 30px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

            button:hover {
                background: var(--accent);
                color: black;
                box-shadow: 0 0 20px var(--accent);
            }

        /* Diplomas */
        .diplomas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #1c2333;
            transition: 0.3s;
            text-align: center; /*  centra texto */
            display: flex; /*  centra vertical también */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

            .card:hover {
                transform: translateY(-6px);
                box-shadow: 0 0 20px rgba(0,240,255,0.15);
            }

        /* Video */
        .video-container iframe {
            width: 100%;
            height: 500px;
            border-radius: 20px;
            border: 1px solid #1c2333;
            box-shadow: 0 0 30px rgba(0,240,255,0.15);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--subtext);
            border-top: 1px solid #1c2333;
        }

        /* Responsive */
        @media(max-width:768px) {

            header h1 {
                font-size: 26px;
            }

            .cv-container iframe {
                height: 400px;
            }

            .video-container iframe {
                height: 250px;
            }

            nav {
                padding: 15px 20px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <h3>SLG</h3>
        <div>
            <a href="#cv">CV</a>
            <a href="#diplomas">Diplomas</a>
            <a href="#tesis">Tesis</a>
        </div>
    </nav>

    <header>
        <h1>Sebastian Lopez Garcia</h1>
        <p>UX/UI • Web Development • Game Creation</p>
    </header>

    <section id="cv">
        <h2>Curriculum Vitae</h2>
        <div class="cv-container">
            <iframe src="SLG_CV.pdf"></iframe>
        </div>
        <div style="text-align:center;margin-top:20px;">
            <a href="SLG_CV.pdf" target="_blank"><button>Ver Completo</button></a>
            <a href="SLG_CV.pdf" download><button>Descargar</button></a>
        </div>
    </section>

    <section id="diplomas">
        <h2>Diplomas</h2>
        <div class="diplomas">
            <div class="card">
                <h3>UX/UI Design</h3>
                <a href="Diplomas/UXUI Certificado.pdf" target="_blank">
                    <button>Ver Diploma</button>
                </a>
            </div>
            <div class="card">
                <h3>Game Development</h3>
                <a href="Diplomas/Game Design Certificado.pdf" target="_blank">
                    <button>Ver Diploma</button>
                </a>
            </div>
        </div>
    </section>

    <section id="tesis">
        <h2>Proyecto de Tesis</h2>
        <div class="video-container">
            <iframe width="560" height="315" 
                    src="https://www.youtube.com/embed/HKRS3xW486M" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen></iframe>
        </div>
    </section>

    <footer>
        © 2026 Sebastian Lopez Garcia
    </footer>

</body>
</html>
