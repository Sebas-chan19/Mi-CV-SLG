<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian Lopez Garcia | Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #f5f5f5;
            line-height: 1.6;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            z-index: 1000;
        }

            nav h3 {
                font-weight: 600;
            }

            nav a {
                color: #aaa;
                text-decoration: none;
                margin-left: 20px;
                font-size: 14px;
            }

                nav a:hover {
                    color: white;
                }

        /* HERO */
        header {
            padding: 100px 20px 60px;
            text-align: center;
        }

            header h1 {
                font-size: 40px;
                font-weight: 700;
            }

            header p {
                margin-top: 10px;
                color: #aaa;
            }

        /* SECTIONS */
        section {
            padding: 80px 20px;
            max-width: 1100px;
            margin: auto;
        }

            section h2 {
                font-size: 28px;
                margin-bottom: 40px;
                text-align: center;
            }

        /* CV */
        .cv-container iframe {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            border: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .buttons {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            margin: 10px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            color: black;
            transition: 0.3s ease;
        }

            button:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(255,255,255,0.1);
            }

        /* Diplomas */
        .diplomas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            transition: 0.3s ease;
            border: 1px solid #222;
        }

            .card:hover {
                transform: translateY(-5px);
                border: 1px solid #444;
            }

            .card h3 {
                margin-bottom: 20px;
            }

        /* Video */
        .video-container iframe {
            width: 100%;
            height: 500px;
            border-radius: 15px;
            border: none;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #777;
            border-top: 1px solid #222;
        }

        /* Responsive */
        @media(max-width:768px) {
            header h1 {
                font-size: 28px;
            }

            .cv-container iframe {
                height: 400px;
            }

            .video-container iframe {
                height: 250px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <h3>Sebastian</h3>
        <div>
            <a href="#cv">CV</a>
            <a href="#diplomas">Diplomas</a>
            <a href="#tesis">Tesis</a>
        </div>
    </nav>

    <header>
        <h1>Sebastian Lopez Garcia</h1>
        <p>UX/UI Designer • Web Developer • Game Creator</p>
    </header>

    <section id="cv">
        <h2>Curriculum Vitae</h2>

        <div class="cv-container">
            <iframe src="SLG_CV.pdf"></iframe>
        </div>

        <div class="buttons">
            <a href="SLG_CV.pdf" target="_blank">
                <button>Ver completo</button>
            </a>
            <a href="SLG_CV.pdf" download>
                <button>Descargar</button>
            </a>
        </div>
    </section>

    <section id="diplomas">
        <h2>Diplomas</h2>

        <div class="diplomas">
            <div class="card">
                <h3>UX/UI Design</h3>
                <a href="Diplomas/UXUI Certificado.pdf" target="_blank">
                    <button>Ver Diploma</button>
                </a>
            </div>

            <div class="card">
                <h3>Creación de Videojuegos</h3>
                <a href="Diplomas/Game Design Certificado.pdf" target="_blank">
                    <button>Ver Diploma</button>
                </a>
            </div>
        </div>
    </section>

    <section id="tesis">
        <h2>Proyecto de Tesis</h2>
        <br />
        <div class="video-container">
            <iframe width="560" height="315"
                    src="https://www.youtube.com/embed/HKRS3xW486M"
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
            </iframe>
</section>

    <footer>
        © 2026 Sebastian Lopez Garcia
    </footer>

</body>
</html>
